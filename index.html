<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#14110E">
<title>Jazz アナライズ × iReal Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Shippori+Mincho:wght@400;500&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14110E; --bg2:#1C1814; --surface:#211C16; --surface2:#2A241D;
    --ink:#EFE6D6; --ink-dim:#B7AC99; --ink-mute:#837868;
    --brass:#D9A441; --brass-deep:#B07F2C; --brass-soft:rgba(217,164,65,.12);
    --line:rgba(217,164,65,.16); --line-soft:rgba(239,230,214,.08);
    --display:"Fraunces",Georgia,"Times New Roman",serif;
    --sans:"Zen Kaku Gothic New",system-ui,-apple-system,"Hiragino Kaku Gothic ProN",sans-serif;
    --mincho:"Shippori Mincho","Hiragino Mincho ProN",serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--ink); font-family:var(--sans);
    line-height:1.6; -webkit-font-smoothing:antialiased;
    padding-bottom:env(safe-area-inset-bottom);
  }
  a{color:inherit}

  /* ---- ヘッダ / 検索バー ---- */
  header{
    position:sticky; top:0; z-index:20; background:rgba(20,17,14,.92);
    backdrop-filter:blur(10px); border-bottom:1px solid var(--line);
    padding:14px 16px calc(12px) ; padding-top:calc(14px + env(safe-area-inset-top));
  }
  .wordmark{display:flex; align-items:baseline; gap:9px; margin:0 0 12px}
  .wordmark .mark{
    font-family:var(--display); font-weight:500; font-size:20px; letter-spacing:.2px;
  }
  .wordmark .mark em{font-style:italic; color:var(--brass)}
  .wordmark .sub{font-size:11px; color:var(--ink-mute); letter-spacing:.08em}

  .search{position:relative}
  .search input{
    width:100%; font-family:var(--sans); font-size:16px; color:var(--ink);
    background:var(--surface); border:1px solid var(--line); border-radius:12px;
    padding:12px 14px 12px 40px; outline:none;
  }
  .search input::placeholder{color:var(--ink-mute)}
  .search input:focus{border-color:var(--brass); box-shadow:0 0 0 3px var(--brass-soft)}
  .search .glass{
    position:absolute; left:14px; top:50%; transform:translateY(-50%);
    width:16px; height:16px; opacity:.55;
  }

  .controls{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap}
  .controls select{
    font-family:var(--sans); font-size:13px; color:var(--ink-dim);
    background:var(--surface); border:1px solid var(--line); border-radius:9px;
    padding:8px 28px 8px 11px; outline:none; cursor:pointer; flex:1 1 auto; min-width:0;
    appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' fill='none' stroke='%23837868' stroke-width='1.4'/></svg>");
    background-repeat:no-repeat; background-position:right 11px center;
  }
  .controls select:focus{border-color:var(--brass)}

  .tagrow{display:flex; gap:6px; margin-top:10px; flex-wrap:wrap}
  .tag{
    font-family:var(--sans); font-size:11.5px; color:var(--ink-dim);
    background:transparent; border:1px solid var(--line-soft); border-radius:999px;
    padding:5px 11px; cursor:pointer; transition:background .12s,border-color .12s,color .12s;
  }
  .tag[aria-pressed="true"]{
    background:var(--brass-soft); border-color:var(--brass); color:var(--brass);
  }

  /* ---- 件数 / 一覧 ---- */
  .meta{padding:14px 16px 4px; font-size:12px; color:var(--ink-mute); letter-spacing:.04em}
  .meta b{color:var(--brass); font-weight:700; font-variant-numeric:tabular-nums}

  ul.list{list-style:none; margin:0; padding:4px 12px 40px}
  li.row{
    display:flex; align-items:center; gap:12px; padding:13px 12px;
    border-bottom:1px solid var(--line-soft); cursor:pointer; border-radius:10px;
    transition:background .12s;
  }
  li.row:hover{background:var(--surface)}
  li.row .name{
    font-family:var(--display); font-weight:500; font-size:17px; line-height:1.25;
    flex:1 1 auto; min-width:0;
  }
  li.row .sub{font-family:var(--sans); font-size:11.5px; color:var(--ink-mute); margin-top:3px}
  li.row .chev{color:var(--ink-mute); flex:0 0 auto}
  .unknown{color:var(--ink-mute); font-style:normal}
  .empty{padding:48px 24px; text-align:center; color:var(--ink-mute); font-size:14px}

  /* ---- 詳細シート ---- */
  .scrim{
    position:fixed; inset:0; z-index:40; background:rgba(8,6,4,.6);
    backdrop-filter:blur(2px); opacity:0; pointer-events:none; transition:opacity .2s;
  }
  .scrim.open{opacity:1; pointer-events:auto}
  .sheet{
    position:fixed; z-index:50; left:0; right:0; bottom:0; top:0;
    background:var(--bg2); display:flex; flex-direction:column;
    transform:translateY(100%); transition:transform .26s cubic-bezier(.2,.7,.25,1);
    overscroll-behavior:contain;
  }
  .sheet.open{transform:translateY(0)}
  .sheet-bar{
    display:flex; align-items:center; gap:12px; padding:14px 16px;
    padding-top:calc(14px + env(safe-area-inset-top));
    border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--bg2);
  }
  .sheet-bar button{
    font-family:var(--sans); font-size:14px; color:var(--ink-dim);
    background:transparent; border:0; cursor:pointer; padding:6px 4px; display:flex; align-items:center; gap:6px;
  }
  .sheet-bar .ttl{font-size:12px; color:var(--ink-mute); letter-spacing:.08em; margin-left:auto}
  .sheet-body{padding:8px 22px 28px; overflow-y:auto; -webkit-overflow-scrolling:touch}

  .d-eyebrow{font-size:11.5px; color:var(--brass); letter-spacing:.12em; text-transform:uppercase; margin:18px 0 6px}
  .d-title{font-family:var(--display); font-weight:500; font-size:30px; line-height:1.15; margin:0 0 14px}
  .d-line{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:22px}
  .pill{
    font-family:var(--sans); font-size:12.5px; color:var(--ink-dim);
    border:1px solid var(--line); border-radius:8px; padding:6px 11px;
  }
  .pill .k{color:var(--ink-mute); margin-right:7px; font-size:11px}

  .d-h{font-family:var(--sans); font-size:12px; color:var(--ink-mute); letter-spacing:.06em; margin:24px 0 9px; border-top:1px solid var(--line-soft); padding-top:18px}
  .chips{display:flex; gap:7px; flex-wrap:wrap}
  .chord{
    font-family:var(--sans); font-weight:500; font-size:13px; color:var(--brass);
    background:var(--brass-soft); border:1px solid var(--line); border-radius:7px; padding:6px 12px;
  }
  .note{font-family:var(--mincho); font-size:16px; line-height:1.95; color:var(--ink); margin:0}
  .orig{margin:0; padding:0; list-style:none}
  .orig li{font-size:13px; color:var(--ink-dim); padding:5px 0; border-bottom:1px dashed var(--line-soft)}
  .orig li:last-child{border-bottom:0}

  /* ---- iReal ボタン ---- */
  .cta-wrap{
    position:sticky; bottom:0; background:linear-gradient(to top,var(--bg2) 70%,transparent);
    padding:16px 22px calc(18px + env(safe-area-inset-bottom));
    margin-top:8px;
  }
  a.cta{
    display:flex; align-items:center; justify-content:center; gap:10px;
    width:100%; font-family:var(--sans); font-weight:700; font-size:16px;
    color:#1A1206; background:var(--brass); border-radius:13px; padding:16px;
    text-decoration:none; border:1px solid var(--brass-deep);
    box-shadow:0 6px 22px rgba(217,164,65,.22);
  }
  a.cta:active{transform:translateY(1px)}
  .cta-foot{text-align:center; font-size:11.5px; color:var(--ink-mute); margin-top:11px}
  .cta-foot a{color:var(--ink-dim); text-decoration:underline; text-underline-offset:2px}

  @media (min-width:760px){
    .sheet{top:5vh; bottom:5vh; left:50%; right:auto; width:min(620px,92vw);
           transform:translate(-50%,110%); border-radius:18px; border:1px solid var(--line);
           box-shadow:0 30px 80px rgba(0,0,0,.5); overflow:hidden}
    .sheet.open{transform:translate(-50%,0)}
    ul.list{padding-left:max(12px,calc((100vw - 760px)/2)); padding-right:max(12px,calc((100vw - 760px)/2))}
    header{padding-left:max(16px,calc((100vw - 760px)/2)); padding-right:max(16px,calc((100vw - 760px)/2))}
    .meta{padding-left:max(16px,calc((100vw - 760px)/2))}
  }
  @media (prefers-reduced-motion:reduce){
    .scrim,.sheet{transition:none}
  }
</style>
</head>
<body>
<header>
  <h1 class="wordmark">
    <span class="mark">Jazz <em>アナライズ</em></span>
    <span class="sub">× iReal Pro</span>
  </h1>
  <div class="search">
    <svg class="glass" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.6"/><path d="M11 11l3.5 3.5" stroke="currentColor" stroke-width="1.6"/></svg>
    <input id="q" type="search" inputmode="search" autocomplete="off"
           placeholder="曲名で探す（別表記でも可）" aria-label="曲名検索">
  </div>
  <div class="controls">
    <select id="fForm" aria-label="形式で絞り込む"></select>
    <select id="fStyle" aria-label="スタイルで絞り込む"></select>
  </div>
  <div class="tagrow" id="tagrow" aria-label="和声的特徴で絞り込む"></div>
</header>

<div class="meta"><b id="count">0</b> 曲</div>
<ul class="list" id="list"></ul>
<div class="empty" id="empty" hidden>該当する曲がありません。条件を緩めてみてください。</div>

<div class="scrim" id="scrim"></div>
<section class="sheet" id="sheet" role="dialog" aria-modal="true" aria-label="曲の詳細" aria-hidden="true">
  <div class="sheet-bar">
    <button id="close" type="button">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      一覧へ
    </button>
    <span class="ttl">ANALYSIS</span>
  </div>
  <div class="sheet-body" id="sheetBody"></div>
</section>

<script src="data.js"></script>
<script>
(function(){
  "use strict";
  var SONGS = (window.SONGS || []);
  var UNKNOWN = "不明";

  // ---- フィルタ用の選択肢を抽出 ----
  function uniqSorted(arr){ return Array.from(new Set(arr)).sort(function(a,b){return a.localeCompare(b,"ja");}); }
  var forms  = uniqSorted(SONGS.map(function(s){return s.form;}));
  var styles = uniqSorted(SONGS.map(function(s){return s.style;}));
  var harmTags = uniqSorted(SONGS.reduce(function(a,s){return a.concat(s.harm);},[]));

  function fillSelect(el, label, opts){
    el.innerHTML = "";
    var o0 = document.createElement("option"); o0.value=""; o0.textContent=label; el.appendChild(o0);
    opts.forEach(function(v){ var o=document.createElement("option"); o.value=v; o.textContent=v; el.appendChild(o); });
  }
  var elForm=document.getElementById("fForm"), elStyle=document.getElementById("fStyle");
  fillSelect(elForm,"形式：すべて",forms);
  fillSelect(elStyle,"スタイル：すべて",styles);

  var tagrow=document.getElementById("tagrow");
  var activeTags=new Set();
  harmTags.forEach(function(t){
    var b=document.createElement("button");
    b.type="button"; b.className="tag"; b.textContent=t; b.setAttribute("aria-pressed","false");
    b.addEventListener("click",function(){
      if(activeTags.has(t)){activeTags.delete(t); b.setAttribute("aria-pressed","false");}
      else{activeTags.add(t); b.setAttribute("aria-pressed","true");}
      render();
    });
    tagrow.appendChild(b);
  });

  // ---- フィルタリング ----
  var elQ=document.getElementById("q");
  function norm(s){return (s||"").toLowerCase();}
  function matches(s){
    var q=norm(elQ.value.trim());
    if(q){
      var hay=norm(s.title)+" "+norm(s.orig.join(" "));
      if(hay.indexOf(q)===-1) return false;
    }
    if(elForm.value && s.form!==elForm.value) return false;
    if(elStyle.value && s.style!==elStyle.value) return false;
    if(activeTags.size){
      // 選択したタグを「すべて」含む曲に絞る
      for(var t of activeTags){ if(s.harm.indexOf(t)===-1) return false; }
    }
    return true;
  }

  // ---- 一覧描画 ----
  var listEl=document.getElementById("list"), countEl=document.getElementById("count"), emptyEl=document.getElementById("empty");
  var filtered=[];
  function render(){
    filtered=SONGS.filter(matches);
    countEl.textContent=filtered.length.toLocaleString("ja");
    emptyEl.hidden = filtered.length!==0;
    var html="";
    for(var i=0;i<filtered.length;i++){
      var s=filtered[i];
      var formTxt = s.form===UNKNOWN ? '<span class="unknown">形式不明</span>' : esc(s.form);
      var styleTxt = s.style===UNKNOWN ? '<span class="unknown">スタイル不明</span>' : esc(s.style);
      html+='<li class="row" data-i="'+i+'">'
          +   '<div style="min-width:0;flex:1 1 auto">'
          +     '<div class="name">'+esc(s.title)+'</div>'
          +     '<div class="sub">'+formTxt+' ・ '+styleTxt+'</div>'
          +   '</div>'
          +   '<svg class="chev" width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'
          + '</li>';
    }
    listEl.innerHTML=html;
  }
  function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}

  listEl.addEventListener("click",function(e){
    var li=e.target.closest("li.row"); if(!li) return;
    openSheet(filtered[+li.dataset.i]);
  });
  elQ.addEventListener("input",render);
  elForm.addEventListener("change",render);
  elStyle.addEventListener("change",render);

  // ---- iReal Pro 検索URL（先頭 The を外す）----
  function irealURL(title){
    var q=String(title).trim().replace(/^the\s+/i,"");
    return "irealb://search?"+encodeURIComponent(q);
  }

  // ---- 詳細シート ----
  var scrim=document.getElementById("scrim"), sheet=document.getElementById("sheet"),
      body=document.getElementById("sheetBody"), closeBtn=document.getElementById("close");
  var lastFocus=null;

  function openSheet(s){
    var harmHtml = s.harm.length
      ? '<div class="chips">'+s.harm.map(function(t){return '<span class="chord">'+esc(t)+'</span>';}).join("")+'</div>'
      : '<span class="unknown">不明</span>';
    var noteHtml = s.note ? '<p class="note">'+esc(s.note)+'</p>' : '<span class="unknown">記載なし</span>';
    var origHtml = (s.orig.length>1)
      ? '<div class="d-h">元の表記（'+s.orig.length+'件）</div><ul class="orig">'
        + s.orig.map(function(o){return '<li>'+esc(o)+'</li>';}).join("") + '</ul>'
      : '';
    var formP  = s.form===UNKNOWN  ? '<span class="unknown">不明</span>' : esc(s.form);
    var styleP = s.style===UNKNOWN ? '<span class="unknown">不明</span>' : esc(s.style);

    body.innerHTML =
        '<div class="d-eyebrow">Tune</div>'
      + '<h2 class="d-title">'+esc(s.title)+'</h2>'
      + '<div class="d-line">'
      +   '<span class="pill"><span class="k">形式</span>'+formP+'</span>'
      +   '<span class="pill"><span class="k">スタイル</span>'+styleP+'</span>'
      +   '<span class="pill"><span class="k">収録</span>'+s.ver+' 版</span>'
      + '</div>'
      + '<div class="d-h">和声的特徴</div>'+harmHtml
      + '<div class="d-h">分類の根拠</div>'+noteHtml
      + origHtml
      + '<div class="cta-wrap">'
      +   '<a class="cta" href="'+irealURL(s.title)+'">'
      +     '<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M4 3l11 6-11 6V3z" fill="#1A1206"/></svg>'
      +     'iReal Pro で開く'
      +   '</a>'
      +   '<div class="cta-foot">アプリが開かない場合は <a href="https://www.irealpro.com" target="_blank" rel="noopener">irealpro.com</a></div>'
      + '</div>';
    body.scrollTop=0;
    lastFocus=document.activeElement;
    scrim.classList.add("open"); sheet.classList.add("open"); sheet.setAttribute("aria-hidden","false");
    document.body.style.overflow="hidden";
    closeBtn.focus();
  }
  function closeSheet(){
    scrim.classList.remove("open"); sheet.classList.remove("open"); sheet.setAttribute("aria-hidden","true");
    document.body.style.overflow="";
    if(lastFocus) lastFocus.focus();
  }
  closeBtn.addEventListener("click",closeSheet);
  scrim.addEventListener("click",closeSheet);
  document.addEventListener("keydown",function(e){ if(e.key==="Escape" && sheet.classList.contains("open")) closeSheet(); });

  render();
})();
</script>
</body>
</html>
